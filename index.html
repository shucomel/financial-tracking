<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monarch Sidebar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #0d1224; /* Latar belakang gelap asal */
            color: #ffffff;
            min-height: 100vh;
        }

        /* --- Gaya Sidebar --- */
        .sidebar {
            width: 260px;
            background-color: #0a0e1a;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            border-right: 1px solid #1e293b;
            position: fixed;
            height: 100vh;
        }

        /* Logo Monarch */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 8px;
        }

        .logo-box {
            background-color: #4f46e5;
            color: white;
            font-weight: bold;
            font-size: 20px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Menu Navigasi */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            color: #e2e8f0;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .nav-item.active {
            color: #818cf8;
            background-color: #1e1b4b; /* Ungu gelap aktif */
        }

        /* --- Kawasan Kandungan (Content Area) --- */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* ==========================================================================
           SISTEM TRANSAKSI ACCOUNTS (TEMA GELAP)
           ========================================================================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-new-tx {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-new-tx:hover {
            background-color: #4338ca;
        }

        .accounts-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
        }

        .data-panel {
            background-color: #0a0e1a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            background-color: #0d1224;
            border: 1px solid #1e293b;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        .filter-select {
            padding: 10px 14px;
            background-color: #0d1224;
            border: 1px solid #1e293b;
            color: white;
            border-radius: 8px;
        }

        /* Jadual */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 12px 16px;
            color: #94a3b8;
            font-size: 14px;
            border-bottom: 1px solid #1e293b;
            text-align: left;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #0d1224;
            color: #e2e8f0;
        }

        /* Badges */
        .badge-cat {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .cat-food { background-color: rgba(234, 88, 12, 0.2); color: #fb923c; }
        .cat-salary { background-color: rgba(22, 163, 74, 0.2); color: #4ade80; }
        .cat-transport { background-color: rgba(79, 70, 229, 0.2); color: #818cf8; }
        .cat-utilities { background-color: rgba(219, 39, 119, 0.2); color: #f472b6; }

        /* Butang Aksi */
        .action-btns {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            padding: 4px 8px;
            font-size: 12px;
            background-color: #0d1224;
            color: #94a3b8;
            border: 1px solid #1e293b;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-action:hover { color: white; background-color: #1e293b; }
        .btn-delete { color: #f43f5e; border-color: rgba(244, 63, 94, 0.4); }
        .btn-delete:hover { background-color: rgba(244, 63, 94, 0.2); color: #ff859b; }

        /* Graf */
        .chart-card {
            background-color: #0a0e1a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .chart-box {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 24px;
            height: 120px;
            margin-top: 20px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 8px;
        }

        .bar { width: 45px; border-radius: 4px 4px 0 0; transition: height 0.3s; }
        .bar-income { background-color: #10b981; }
        .bar-expense { background-color: #f43f5e; }
        .bar-label { font-size: 11px; color: #94a3b8; margin-top: 6px; }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #0a0e1a;
            border: 1px solid #1e293b;
            padding: 24px;
            border-radius: 12px;
            width: 400px;
            color: white;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 6px; color: #94a3b8; }
        .form-control { width: 100%; padding: 10px; background-color: #0d1224; border: 1px solid #1e293b; color: white; border-radius: 6px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-box">M</div>
            <span class="logo-text">monarch</span>
        </div>
        <ul class="nav-menu">
            <li><a href="#" class="nav-item" onclick="tukarPage('dashboard', this)"><span class="nav-icon">🏠</span> Dashboard</a></li>
            <li><a href="#" class="nav-item active" onclick="tukarPage('accounts', this)"><span class="nav-icon">💰</span> Accounts</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('cashflow', this)"><span class="nav-icon">📊</span> Cash Flow</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('goals', this)"><span class="nav-icon">🎯</span> Goals</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('settings', this)"><span class="nav-icon">⚙️</span> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="page">
            <h2>Selamat Datang ke Dashboard</h2>
            <p style="color: #94a3b8; margin-top: 5px;">Ini adalah halaman utama anda.</p>
        </div>

        <div id="accounts" class="page active">
            <div class="top-bar">
                <h2>Akaun & Transaksi</h2>
                <button class="btn-new-tx" onclick="bukaModal()">+ NEW TRANSACTION</button>
            </div>

            <div class="accounts-layout">
                <div class="data-panel">
                    <div class="filter-bar">
                        <input type="text" id="searchBox" class="search-input" placeholder="Cari transaksi..." oninput="tapisData()">
                        <select id="filterCategory" class="filter-select" onchange="tapisData()">
                            <option value="All">Semua Kategori</option>
                            <option value="Salary">Salary</option>
                            <option value="Food & Drink">Food & Drink</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                        </select>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="txTableBody"></tbody>
                    </table>
                </div>

                <div class="side-panel">
                    <div class="chart-card">
                        <h4>Ringkasan Aliran</h4>
                        <div class="chart-box">
                            <div>
                                <div id="barIncome" class="bar bar-income" style="height: 0px;"></div>
                                <div class="bar-label">Income</div>
                            </div>
                            <div>
                                <div id="barExpense" class="bar bar-expense" style="height: 0px;"></div>
                                <div class="bar-label">Expenses</div>
                            </div>
                        </div>
                        <div style="margin-top: 15px; text-align: left; font-size: 13px;">
                            <p>🟢 Masuk: <b id="lblIncome" style="color:#10b981;">RM 0</b></p>
                            <p>🔴 Keluar: <b id="lblExpense" style="color:#f43f5e;">RM 0</b></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="txModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Transaksi</h3><br>
            <form id="txForm">
                <input type="hidden" id="editIndex">
                <div class="form-group"><label>Tarikh</label><input type="date" id="txDate" class="form-control" required></div>
                <div class="form-group"><label>Deskripsi</label><input type="text" id="txDesc" class="form-control" placeholder="Contoh: Makan Malam" required></div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="txCat" class="form-control">
                        <option value="Food & Drink">Food & Drink</option>
                        <option value="Salary">Salary</option>
                        <option value="Transport">Transport</option>
                        <option value="Utilities">Utilities</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis</label>
                    <select id="txType" class="form-control">
                        <option value="Deposit">Deposit (Masuk)</option>
                        <option value="Expense">Expense (Keluar)</option>
                    </select>
                </div>
                <div class="form-group"><label>Jumlah (RM)</label><input type="number" id="txAmount" class="form-control" step="0.01" required></div>
                <div class="modal-footer">
                    <button type="button" class="btn-action" onclick="tutupModal()">CANCEL</button>
                    <button type="submit" class="btn-new-tx">SAVE CHANGES</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data permulaan
        let db = JSON.parse(localStorage.getItem('monarch_db_v2')) || [
            { date: '19-Feb-22', desc: 'Makan di Mamak', cat: 'Food & Drink', type: 'Deposit', amount: 200 },
            { date: '19-Feb-22', desc: 'Gaji Bulan Julai', cat: 'Salary', type: 'Expense', amount: 3000 },
            { date: '13-Feb-22', desc: 'Petrol (Shell)', cat: 'Transport', type: 'Expense', amount: 50 }
        ];

        function tukarPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function paparkanData(dataSuntikan = db) {
            const tbody = document.getElementById('txTableBody');
            tbody.innerHTML = '';
            let totalIn = 0, totalOut = 0;

            dataSuntikan.forEach((item, index) => {
                if(item.type === 'Deposit') totalIn += item.amount;
                else totalOut += item.amount;

                let classCat = 'cat-food';
                if(item.cat === 'Salary') classCat = 'cat-salary';
                if(item.cat === 'Transport') classCat = 'cat-transport';
                if(item.cat === 'Utilities') classCat = 'cat-utilities';

                tbody.innerHTML += `<tr>
                    <td>${item.date}</td>
                    <td>${item.desc}</td>
                    <td><span class="badge-cat ${classCat}">${item.cat}</span></td>
                    <td style="color:${item.type==='Deposit'?'#10b981':'#f43f5e'}">➔ ${item.type}</td>
                    <td>RM ${item.amount.toFixed(2)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-action" onclick="editRow(${index})">Edit</button>
                            <button class="btn-action btn-delete" onclick="deleteRow(${index})">Delete</button>
                            <button class="btn-action" onclick="copyRow(${index})">Copy</button>
                        </div>
                    </td>
                </tr>`;
            });

            document.getElementById('lblIncome').innerText = `RM ${totalIn.toFixed(2)}`;
            document.getElementById('lblExpense').innerText = `RM ${totalOut.toFixed(2)}`;
            let max = Math.max(totalIn, totalOut, 100);
            document.getElementById('barIncome').style.height = `${(totalIn/max) * 100}px`;
            document.getElementById('barExpense').style.height = `${(totalOut/max) * 100}px`;
            localStorage.setItem('monarch_db_v2', JSON.stringify(db));
        }

        function tapisData() {
            let carian = document.getElementById('searchBox').value.toLowerCase();
            let kat = document.getElementById('filterCategory').value;
            let hasil = db.filter(item => (kat === 'All' || item.cat === kat) && item.desc.toLowerCase().includes(carian));
            paparkanData(hasil);
        }

        function bukaModal() {
            document.getElementById('txForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('modalTitle').innerText = "Tambah Transaksi";
            document.getElementById('txDate').valueAsDate = new Date();
            document.getElementById('txModal').style.display = 'flex';
        }
        function tutupModal() { document.getElementById('txModal').style.display = 'none'; }

        document.getElementById('txForm').addEventListener('submit', function(e){
            e.preventDefault();
            let idx = document.getElementById('editIndex').value;
            let d = new Date(document.getElementById('txDate').value);
            let tgl = `${d.getDate()}-${d.toLocaleString('default', {month: 'short'})}-${d.getFullYear().toString().substr(-2)}`;
            
            let dataBaru = {
                date: tgl,
                desc: document.getElementById('txDesc').value,
                cat: document.getElementById('txCat').value,
                type: document.getElementById('txType').value,
                amount: parseFloat(document.getElementById('txAmount').value)
            };

            if(idx === '') db.push(dataBaru);
            else db[idx] = dataBaru;

            tutupModal(); paparkanData();
        });

        function deleteRow(index) { if(confirm("Padam rekod?")) { db.splice(index, 1); paparkanData(); } }
        function copyRow(index) { let c = Object.assign({}, db[index]); c.desc += " (Salinan)"; db.push(c); paparkanData(); }
        function editRow(index) {
            let item = db[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('txDesc').value = item.desc;
            document.getElementById('txCat').value = item.cat;
            document.getElementById('txType').value = item.type;
            document.getElementById('txAmount').value = item.amount;
            document.getElementById('modalTitle').innerText = "Kemaskini Transaksi";
            document.getElementById('txModal').style.display = 'flex';
        }

        paparkanData();
    </script>
</body>
</html>
