<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Dashboard Keuangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <div class="flex items-center gap-2">
                <i data-lucide="wallet" class="text-emerald-400 w-8 h-8"></i>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">FinTrack</h1>
            </div>
            <p class="text-sm text-slate-400">Pelacak Keuangan Pribadi</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-24 h-24 bg-cyan-500/10 rounded-full blur-2xl group-hover:bg-cyan-500/20 transition-all"></div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm font-medium text-slate-400">Total Saldo</span>
                    <i data-lucide="scale" class="text-cyan-400 w-5 h-5"></i>
                </div>
                <h2 id="total-balance" class="text-3xl font-bold text-cyan-400">Rp 0</h2>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl group-hover:bg-emerald-500/20 transition-all"></div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm font-medium text-slate-400">Pemasukan</span>
                    <i data-lucide="trending-up" class="text-emerald-400 w-5 h-5"></i>
                </div>
                <h2 id="total-income" class="text-3xl font-bold text-emerald-400">Rp 0</h2>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl group-hover:bg-rose-500/20 transition-all"></div>
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm font-medium text-slate-400">Pengeluaran</span>
                    <i data-lucide="trending-down" class="text-rose-400 w-5 h-5"></i>
                </div>
                <h2 id="total-expense" class="text-3xl font-bold text-rose-400">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl h-fit">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-emerald-400 w-5 h-5"></i> Tambah Transaksi
                </h3>
                <form id="transaction-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Nama Transaksi</label>
                        <input type="text" id="text" placeholder="Gaji, Makan, dll..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-400 transition" required />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Jumlah (Rp)</label>
                        <input type="number" id="amount" placeholder="Contoh: 50000" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-400 transition" required />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Jenis</label>
                        <select id="type" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-emerald-400 transition">
                            <option value="income" class="text-emerald-400">Pemasukan (+)</option>
                            <option value="expense" class="text-rose-400">Pengeluaran (-)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-600 hover:to-cyan-600 text-slate-950 font-bold py-2.5 px-4 rounded-xl text-sm transition shadow-lg shadow-emerald-500/20 cursor-pointer">
                        Simpan Transaksi
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="history" class="text-cyan-400 w-5 h-5"></i> Riwayat Transaksi
                </h3>
                <div class="overflow-y-auto max-h-[350px] pr-2 custom-scrollbar">
                    <ul id="transaction-list" class="space-y-3">
                        <p class="text-slate-500 text-sm text-center py-8">Belum ada transaksi.</p>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Lucide Icons
        lucide.createIcons();

        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');
        const listEl = document.getElementById('transaction-list');
        const form = document.getElementById('transaction-form');
        const textInput = document.getElementById('text');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');

        // Mengambil data dari LocalStorage biar data tidak hilang saat refresh
        let transactions = localStorage.getItem('transactions') !== null ? JSON.parse(localStorage.getItem('transactions')) : [];

        function formatRupiah(angka) {
            return 'Rp ' + Number(angka).toLocaleString('id-ID');
        }

        function updateDashboard() {
            const amounts = transactions.map(t => t.type === 'income' ? t.amount : -t.amount);
            
            const total = amounts.reduce((acc, item) => (acc += item), 0);
            const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);

            balanceEl.innerText = formatRupiah(total);
            incomeEl.innerText = formatRupiah(income);
            expenseEl.innerText = formatRupiah(expense);

            // Ubah warna saldo jika minus
            if (total < 0) {
                balanceEl.className = "text-3xl font-bold text-rose-400";
            } else {
                balanceEl.className = "text-3xl font-bold text-cyan-400";
            }

            renderList();
        }

        function renderList() {
            listEl.innerHTML = '';
            
            if (transactions.length === 0) {
                listEl.innerHTML = '<p class="text-slate-500 text-sm text-center py-8">Belum ada transaksi.</p>';
                return;
            }

            transactions.forEach(t => {
                const li = document.createElement('li');
                const isIncome = t.type === 'income';
                
                li.className = `flex justify-between items-center bg-slate-950/50 border ${isIncome ? 'border-emerald-500/20' : 'border-rose-500/20'} p-4 rounded-xl transition hover:bg-slate-950`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-lg ${isIncome ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}">
                            <i data-lucide="${isIncome ? 'arrow-up-right' : 'arrow-down-left'}" class="w-4 h-4"></i>
                        </div>
                        <span class="font-medium text-sm text-slate-200">${t.text}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-sm ${isIncome ? 'text-emerald-400' : 'text-rose-400'}">
                            ${isIncome ? '+' : '-'} ${formatRupiah(t.amount)}
                        </span>
                        <button onclick="deleteTransaction(${t.id})" class="text-slate-500 hover:text-rose-400 transition cursor-pointer">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                listEl.appendChild(li);
            });
            lucide.createIcons();
        }

        function addTransaction(e) {
            e.preventDefault();

            if (textInput.value.trim() === '' || amountInput.value.trim() === '') return;

            const transaction = {
                id: Date.now(),
                text: textInput.value,
                amount: parseFloat(amountInput.value),
                type: typeInput.value
            };

            transactions.push(transaction);
            updateLocalStorage();
            updateDashboard();

            textInput.value = '';
            amountInput.value = '';
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateLocalStorage();
            updateDashboard();
        }

        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        form.addEventListener('submit', addTransaction);
        updateDashboard();
    </script>
</body>
</html>
