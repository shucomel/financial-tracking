<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finva - Premium Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen font-sans selection:bg-teal-500/30 selection:text-teal-200">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-[#111827] border-r border-slate-800/60 p-6 hidden md:flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div class="bg-gradient-to-tr from-teal-400 to-indigo-600 p-2.5 rounded-xl shadow-lg shadow-teal-500/20">
                        <i data-lucide="activity" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-black tracking-wider bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">FINVA</span>
                </div>
                
                <nav class="space-y-1.5">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-teal-500/10 to-transparent border-l-2 border-teal-400 text-teal-400 rounded-r-xl font-medium transition text-sm">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 rounded-xl font-medium transition text-sm group">
                        <i data-lucide="arrow-left-right" class="w-4 h-4 text-slate-500 group-hover:text-slate-400"></i> Transaksi
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 rounded-xl font-medium transition text-sm group">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-slate-500 group-hover:text-slate-400"></i> Analisis
                    </a>
                </nav>
            </div>
            
            <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-4 text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-24 h-24 bg-teal-500/10 rounded-full blur-xl"></div>
                <p class="text-xs text-slate-400 mb-2 relative z-10">Butuh bantuan?</p>
                <button class="w-full bg-slate-800 hover:bg-slate-700 text-xs py-2 rounded-lg font-medium transition cursor-pointer">Buka Dokumen</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-[#0b0f19] custom-scrollbar">
            
            <header class="bg-[#111827]/40 backdrop-blur-md border-b border-slate-800/40 sticky top-0 z-50 px-8 py-4 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">Ringkasan Finansial</h1>
                    <p class="text-xs text-slate-400 mt-0.5">Pantau arus kas Anda secara real-time</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative hidden sm:block">
                        <i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-2.5"></i>
                        <input type="text" placeholder="Cari sesuatu..." class="bg-slate-900/80 border border-slate-800/80 pl-9 pr-4 py-1.5 rounded-xl text-xs focus:outline-none focus:border-teal-500/50 w-48 transition" />
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center font-bold text-xs shadow-md">
                        JD
                    </div>
                </div>
            </header>

            <div class="p-6 md:p-8 max-w-6xl mx-auto space-y-8">
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                    <div class="bg-gradient-to-br from-[#161e2e] to-[#111827] border border-slate-800/80 p-6 rounded-3xl relative overflow-hidden group shadow-2xl">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-teal-500/5 rounded-full blur-3xl group-hover:bg-teal-500/10 transition-all duration-500"></div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Total Saldo</span>
                            <div class="p-2 bg-teal-500/10 rounded-xl text-teal-400"><i data-lucide="wallet-2" class="w-4 h-4"></i></div>
                        </div>
                        <h2 id="total-balance" class="text-3xl font-extrabold tracking-tight text-white transition-all">Rp 0</h2>
                        <div class="mt-2 text-[10px] text-slate-400 flex items-center gap-1">
                            <span class="text-teal-400 font-medium flex items-center"><i data-lucide="sparkles" class="w-3 h-3 mr-0.5"></i> Diperbarui</span> baru saja
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-[#161e2e] to-[#111827] border border-slate-800/80 p-6 rounded-3xl relative overflow-hidden group shadow-2xl">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl group-hover:bg-emerald-500/10 transition-all duration-500"></div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-semibold tracking-wider text-slate
