<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monarch - Single Page App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            border-right: 1px solid #e2e8f0;
            position: fixed;
            height: 100vh;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 8px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            color: #64748b;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        .nav-item.active {
            color: #ffffff;
            background-color: #1e3a8a; /* Biru Gelap Monarch */
        }

        /* --- KANDUNGAN UTAMA --- */
        .main-content {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* --- TOP BAR (BUTANG + NEW TRANSACTION & PROFILE) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .btn-new-tx {
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-new-tx:hover {
            background-color: #172554;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #64748b;
        }

        /* --- STRUKTUR GRID HALAMAN ACCOUNTS --- */
        .accounts-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 24px;
        }

        /* --- KAWASAN TAPAK DATA & FILTER --- */
        .data-panel {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }

        .filter-select {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: white;
            color: #334155;
        }

        /* --- REKA BENTUK JADUAL MONARCH --- */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 12px 16px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        /* BADGES / KATEGORI */
        .badge-cat {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .cat-food { background-color: #ffedd5; color: #ea580c; }
        .cat-salary { background-color: #dcfce7; color: #16a34a; }
        .cat-transport { background-color: #e0e7ff; color: #4f46e5; }
        .cat-utilities { background-color: #fce7f3; color: #db2777; }
        .cat-default { background-color: #f1f5f9; color: #475569; }

        /* BUTANG TINDAKAN BARIS (Row Actions) */
        .action-btns {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #cbd5e1;
            background-color: white;
        }
        .btn-action:hover { background-color: #f8fafc; }
        .btn-delete { color: #ef4444; border-color: #fca5a5; }
        .btn-delete:hover { background-color: #fef2f2; }

        /* --- KAD GRAF & RINGKASAN (KANAN) --- */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chart-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .chart-box {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 120px;
            margin-top: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .bar {
            width: 40px;
            border-radius: 4px 4px 0 0;
            transition: height 0.3s;
        }
        .bar-income { background-color: #10b981; }
        .bar-expense { background-color: #f43f5e; }

        .bar-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        /* --- MODAL BOX (BORANG POP-UP UNTUK INPUT DATA) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.4);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid #e2e8f0;
        }

        .modal h3 { margin-bottom: 16px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; color: #64748b;}
        .form-control { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save { background-color: #1e3a8a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600;}
        .btn-cancel { background-color: #e2e8f0; color: #334155; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-container">
            <span class="logo-text">🦋 monarch</span>
        </div>
        <ul class="nav-menu">
            <li><a href="#" class="nav-item" onclick="tukarPage('dashboard', this)">🏠 Dashboard</a></li>
            <li><a href="#" class="nav-item active" onclick="tukarPage('accounts', this)">💳 Accounts</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('cashflow', this)">📊 Cash Flow</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('goals', this)">🎯 Goals</a></li>
            <li><a href="#" class="nav-item" onclick="tukarPage('settings', this)">⚙️ Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="page">
            <h2>Halaman Dashboard</h2>
            <p>Selamat pulang ke rumahan utama.</p>
        </div>

        <div id="accounts" class="page active">
            
            <div class="top-bar">
                <button class="btn-new-tx" onclick="bukaModal()">+ NEW TRANSACTION</button>
                <div class="profile-section">
                    <span>✉️</span> <span>🔔</span> <span>👤 Pengguna</span>
                </div>
            </div>

            <div class="accounts-layout">
                
                <div class="data-panel">
                    <div class="filter-bar">
                        <input type="text" id="searchBox" class="search-input" placeholder="Search Transactions..." oninput="tapisData()">
                        
                        <select id="filterCategory" class="filter-select" onchange="tapisData()">
                            <option value="All">All Categories</option>
                            <option value="Salary">Salary</option>
                            <option value="Food & Drink">Food & Drink</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>
                        </select>

                        <select id="filterMonth" class="filter-select">
                            <option value="This Month">This Month</option>
                        </select>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="txTableBody">
                            </tbody>
                    </table>
                </div>

                <div class="side-panel">
                    <div class="chart-card">
                        <h4>Aliran Kewangan (RM)</h4>
                        <div class="chart-box">
                            <div>
                                <div id="barIncome" class="bar bar-income" style="height: 0px;"></div>
                                <div class="bar-label">Income</div>
                            </div>
                            <div>
                                <div id="barExpense" class="bar bar-expense" style="height: 0px;"></div>
                                <div class="bar-label">Expenses</div>
                            </div>
                        </div>
                        <div style="margin-top: 15px; font-size: 13px; text-align: left;">
                            <p>🟢 Masuk: <b id="lblIncome">RM 0</b></p>
                            <p>🔴 Keluar: <b id="lblExpense">RM 0</b></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="txModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Transaksi</h3>
            <form id="txForm">
                <input type="hidden" id="editIndex">
                <div class="form-group">
                    <label>Tarikh</label>
                    <input type="date" id="txDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <input type="text" id="txDesc" class="form-control" placeholder="Makan di mamak" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="txCat" class="form-control">
                        <option value="Salary">Salary</option>
                        <option value="Food & Drink">Food & Drink</option>
                        <option value="Transport">Transport</option>
                        <option value="Utilities">Utilities</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis</label>
                    <select id="txType" class="form-control">
                        <option value="Deposit">Deposit (Masuk)</option>
                        <option value="Expense">Expense (Keluar)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jumlah (RM)</label>
                    <input type="number" id="txAmount" class="form-control" step="0.01" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="tutupModal()">CANCEL</button>
                    <button type="submit" class="btn-save">SAVE CHANGES</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data Mock Permulaan seakan gambar anda
        let db = JSON.parse(localStorage.getItem('monarch_db')) || [
            { date: '2026-02-19', desc: 'Makan di Mamak', cat: 'Food & Drink', type: 'Deposit', amount: 200 },
            { date: '2026-02-19', desc: 'Gaji Bulan Julai', cat: 'Salary', type: 'Expense', amount: 3.00 },
            { date: '2026-01-19', desc: 'Gaji Bulan Mamak', cat: 'Salary', type: 'Deposit', amount: 50 },
            { date: '2026-02-13', desc: 'Petrol (Shell)', cat: 'Transport', type: 'Expense', amount: 50 },
            { date: '2026-02-13', desc: 'Bayaran Utiliti', cat: 'Utilities', type: 'Expense', amount: 2.00 }
        ];

        // Navigasi Tab
        function tukarPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // Papar Data & Kira Graf
        function paparkanData(dataSuntikan = db) {
            const tbody = document.getElementById('txTableBody');
            tbody.innerHTML = '';
            
            let totalIn = 0; let totalOut = 0;

            dataSuntikan.forEach((item, index) => {
                // Kira untuk graf panel kanan
                if(item.type === 'Deposit') totalIn += item.amount;
                else totalOut += item.amount;

                // Tentukan warna kelas kategori
                let classCat = 'cat-default';
                if(item.cat === 'Food & Drink') classCat = 'cat-food';
                if(item.cat === 'Salary') classCat = 'cat-salary';
                if(item.cat === 'Transport') classCat = 'cat-transport';
                if(item.cat === 'Utilities') classCat = 'cat-utilities';

                let row = `<tr>
                    <td>${item.date}</td>
                    <td>${item.desc}</td>
                    <td><span class="badge-cat ${classCat}">${item.cat}</span></td>
                    <td style="color:${item.type==='Deposit'?'#10b981':'#f43f5e'}">${item.type === 'Deposit' ? '➔ Deposit' : '➔ Expense'}</td>
                    <td>RM ${item.amount.toFixed(2)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-action" onclick="editRow(${index})">Edit</button>
                            <button class="btn-action btn-delete" onclick="deleteRow(${index})">Delete</button>
                            <button class="btn-action" onclick="copyRow(${index})">Copy</button>
                        </div>
                    </td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // Kemas kini komponen graf visual
            document.getElementById('lblIncome').innerText = `RM ${totalIn.toFixed(2)}`;
            document.getElementById('lblExpense').innerText = `RM ${totalOut.toFixed(2)}`;
            
            let max = Math.max(totalIn, totalOut, 100);
            document.getElementById('barIncome').style.height = `${(totalIn/max) * 100}px`;
            document.getElementById('barExpense').style.height = `${(totalOut/max) * 100}px`;
