<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-indigo-900 text-white p-6 hidden md:block">
            <h1 class="text-2xl font-bold mb-8 flex items-center gap-2">
                <i class="fa-solid fa-wallet text-teal-400"></i> DuitCermat
            </h1>
            <nav class="space-y-4">
                <a href="#" class="flex items-center gap-3 bg-indigo-800 p-3 rounded-lg text-white font-medium">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition">
                    <i class="fa-solid fa-exchange-alt"></i> Transaksi
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition">
                    <i class="fa-solid fa-gear"></i> Pengaturan
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            
            <header class="bg-white shadow-sm p-4 flex justify-between items-center px-8">
                <h2 class="text-xl font-semibold">Financial Dashboard</h2>
                <div class="flex items-center gap-3">
                    <span class="font-medium text-sm">Halo, Pengguna Kaya 👋</span>
                    <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">
                        PK
                    </div>
                </div>
            </header>

            <main class="p-6 max-w-6xl w-full mx-auto space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-gray-500 font-medium">Total Saldo</span>
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                                <i class="fa-solid fa-scale-balanced"></i>
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-900" id="total-balance">Rp 0</h3>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-gray-500 font-medium">Total Pemasukan</span>
                            <div class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                <i class="fa-solid fa-arrow-trend-up"></i>
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold text-green-600" id="total-income">Rp 0</h3>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-gray-500 font-medium">Total Pengeluaran</span>
                            <div class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center">
                                <i class="fa-solid fa-arrow-trend-down"></i>
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold text-red-600" id="total-expense">Rp 0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                        <h3 class="text-lg font-bold mb-4">Tambah Transaksi</h3>
                        <form id="transaction-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Deskripsi</label>
                                <input type="text" id="desc" required placeholder="Contoh: Gaji bulanan, Beli kopi" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Jumlah (Rp)</label>
                                <input type="number" id="amount" required placeholder="Contoh: 50000" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Jenis</label>
                                <select id="type" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                    <option value="income">Pemasukan (+)</option>
                                    <option value="expense">Pengeluaran (-)</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white font-medium p-2.5 rounded-lg hover:bg-indigo-700 transition">
                                Simpan Transaksi
                            </button>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                        <h3 class="text-lg font-bold mb-4">Riwayat Transaksi</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="border-b border-gray-200 text-gray-500 text-sm">
                                        <th class="pb-3 font-semibold">Deskripsi</th>
                                        <th class="pb-3 font-semibold">Jenis</th>
                                        <th class="pb-3 font-semibold text-right">Jumlah</th>
                                        <th class="pb-3 font-semibold text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-list" class="divide-y divide-gray-100 text-sm">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        // State data aplikasi (menggunakan localStorage agar data tidak hilang saat direfresh)
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const form = document.getElementById('transaction-form');
        const descInput = document.getElementById('desc');
        const amountInput = document.getElementById('amount');
        const typeInput = document.getElementById('type');

        const totalBalanceEl = document.getElementById('total-balance');
        const totalIncomeEl = document.getElementById('total-income');
        const totalExpenseEl = document.getElementById('total-expense');
        const transactionListEl = document.getElementById('transaction-list');

        // Format angka ke Rupiah
        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        }

        // Fungsi Update UI Angka dan Tabel
        function updateDashboard() {
            let income = 0;
            let expense = 0;

            transactionListEl.innerHTML = '';

            if (transactions.length === 0) {
                transactionListEl.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-gray-400 italic">Belum ada transaksi.</td></tr>`;
            }

            transactions.forEach((t, index) => {
                if (t.type === 'income') income += t.amount;
                if (t.type === 'expense') expense += t.amount;

                // Buat baris tabel baru
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50";
                row.innerHTML = `
                    <td class="py-3 font-medium">${t.desc}</td>
                    <td class="py-3">
                        <span class="px-2 py-1 rounded text-xs font-semibold ${t.type === 'income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${t.type === 'income' ? 'Masuk' : 'Keluar'}
                        </span>
                    </td>
                    <td class="py-3 text-right font-semibold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                        ${t.type === 'income' ? '+' : '-'} ${formatRupiah(t.amount)}
                    </td>
                    <td class="py-3 text-center">
                        <button onclick="deleteTransaction(${index})" class="text-gray-400 hover:text-red-600 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                transactionListEl.appendChild(row);
            });

            const balance = income - expense;

            // Masukkan nilai ke HTML
            totalBalanceEl.innerText = formatRupiah(balance);
            totalIncomeEl.innerText = formatRupiah(income);
            totalExpenseEl.innerText = formatRupiah(expense);

            // Simpan ke local storage
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Event listener saat form disubmit
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const newTx = {
                desc: descInput.value,
                amount: parseFloat(amountInput.value),
                type: typeInput.value
            };

            transactions.push(newTx);
            updateDashboard();

            // Reset form input
            form.reset();
        });

        // Fungsi hapus transaksi
        function deleteTransaction(index) {
            transactions.splice(index, 1);
            updateDashboard();
        }

        // Jalankan update saat halaman pertama dimuat
        updateDashboard();
    </script>
</body>
</html>
